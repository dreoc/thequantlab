<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - TheQuantLab</title>
    <link rel="stylesheet" href="../css/publications-grid.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <!-- Publications Section -->
    <section id="publications" class="publications-section">
        <div class="container">
            <h2 class="section-title">Publications</h2>
            
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="publicationSearch" class="search-input" placeholder="Search publications by title, authors, or keywords...">
                <i class="fas fa-search search-icon"></i>
            </div>
            
            <!-- Category Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" data-category="all">All</button>
                <button class="tab-btn" data-category="AI">AI</button>
                <button class="tab-btn" data-category="ML">ML</button>
                <button class="tab-btn" data-category="Data Science">Data Science</button>
                <button class="tab-btn" data-category="Other">Other</button>
            </div>
            
            <!-- Main Content Area -->
            <div class="publications-content">
                <!-- Carousel Area (Left) -->
                <div class="carousel-container">
                    <button class="carousel-nav prev-btn" id="prevBtn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    
                    <div class="publications-carousel" id="publicationsCarousel">
                        <!-- Publication cards will be inserted here by JavaScript -->
                    </div>
                    
                    <button class="carousel-nav next-btn" id="nextBtn">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                
                <!-- Preview Panel (Right) -->
                <div class="preview-panel" id="previewPanel">
                    <div class="preview-default">
                        <i class="fas fa-mouse-pointer preview-icon"></i>
                        <p>Hover over a publication to see the abstract</p>
                    </div>
                    <div class="preview-content" id="previewContent" style="display: none;">
                        <h3 class="preview-title" id="previewTitle"></h3>
                        <p class="preview-authors" id="previewAuthors"></p>
                        <p class="preview-year" id="previewYear"></p>
                        <div class="preview-abstract" id="previewAbstract"></div>
                        <a href="#" class="preview-link" id="previewLink" target="_blank">
                            Read Full Paper <i class="fas fa-external-link-alt"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script src="../js/publications-infinite-scroll.js"></script>
</body>
</html>
